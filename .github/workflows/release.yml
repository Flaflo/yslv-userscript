name: Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      github:
        description: "Publish GitHub Release"
        type: boolean
        default: true
      chrome:
        description: "Publish to Chrome Web Store"
        type: boolean
        default: true
      firefox:
        description: "Publish to Firefox AMO"
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Install git-cliff
        run: |
          curl -sL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/
          git-cliff --version

      - name: Install dependencies
        run: npm ci

      - name: Determine next version
        id: version
        run: |
          CURRENT=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.0.0")
          NEXT=$(git-cliff --bumped-version --config cliff.toml)
          if [ "$CURRENT" = "$NEXT" ]; then
            echo "::error::No releasable changes since $CURRENT"
            exit 1
          fi
          echo "value=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Bump package.json version
        run: npm version ${{ steps.version.outputs.value }} --no-git-tag-version

      - name: Build all artifacts
        run: npm run build

      - name: Generate changelog
        run: git-cliff --unreleased --strip header --tag ${{ steps.version.outputs.value }} --config cliff.toml -o CHANGELOG.md

      - name: Append compare link to changelog
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          VER="${{ steps.version.outputs.value }}"
          if [ -n "$PREV" ]; then
            echo "" >> CHANGELOG.md
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV}...${VER}" >> CHANGELOG.md
          fi

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m ":bookmark: Release ${{ steps.version.outputs.value }}"
          git tag "${{ steps.version.outputs.value }}"
          git push origin main --follow-tags

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.value }}" \
            --draft \
            --title "${{ steps.version.outputs.value }}" \
            --notes-file CHANGELOG.md \
            dist/yslv.user.js \
            dist-ext/yslv-chromium.zip \
            dist-ext/yslv-firefox.zip \
            README.md \
            PRIVACY.md

  publish:
    needs: release
    uses: ./.github/workflows/publish.yml
    with:
      tag: ${{ needs.release.outputs.version }}
      github: ${{ inputs.github }}
      chrome: ${{ inputs.chrome }}
      firefox: ${{ inputs.firefox }}
    secrets: inherit
