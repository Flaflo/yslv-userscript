name: Publish

on:
  workflow_call:
    inputs:
      tag:
        description: "Version tag to publish"
        type: string
        required: true
      github:
        description: "Publish GitHub Release"
        type: boolean
        default: true
      chrome:
        description: "Publish to Chrome Web Store"
        type: boolean
        default: true
      firefox:
        description: "Publish to Firefox AMO"
        type: boolean
        default: true

  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish"
        type: string
        required: true
      github:
        description: "Publish GitHub Release"
        type: boolean
        default: true
      chrome:
        description: "Publish to Chrome Web Store"
        type: boolean
        default: true
      firefox:
        description: "Publish to Firefox AMO"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  github:
    if: inputs.github
    runs-on: ubuntu-latest
    environment: production-github
    steps:
      - name: Undraft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ inputs.tag }}" --draft=false

  chrome:
    if: inputs.chrome
    runs-on: ubuntu-latest
    environment: production-chrome
    steps:
      - name: Download Chrome extension from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release download "${{ inputs.tag }}" --pattern "yslv-chromium.zip"

      - name: Publish to Chrome Web Store
        uses: browser-actions/release-chrome-extension@latest
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          extension-path: yslv-chromium.zip
          oauth-client-id: ${{ secrets.CHROME_CLIENT_ID }}
          oauth-client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          oauth-refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

  firefox:
    if: inputs.firefox
    runs-on: ubuntu-latest
    environment: production-firefox
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -sL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/

      - name: Download Firefox extension from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release download "${{ inputs.tag }}" --pattern "yslv-firefox.zip"

      - name: Download source archive
        run: curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${{ inputs.tag }}.zip" -o yslv-source.zip

      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(git-cliff --latest --strip header --config cliff.toml)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ inputs.tag }}"
          fi
          {
            echo "value<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Firefox AMO
        uses: browser-actions/release-firefox-addon@latest
        with:
          addon-id: yslv@flaflo.xyz
          addon-path: yslv-firefox.zip
          source-path: yslv-source.zip
          license: MIT
          release-note: ${{ steps.notes.outputs.value }}
          approval-note: "Build: npm ci && npm run build:ext"
          auth-api-issuer: ${{ secrets.AMO_ISSUER }}
          auth-api-secret: ${{ secrets.AMO_SECRET }}
