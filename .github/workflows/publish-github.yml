name: Publish GitHub Release

on:
  workflow_call:
    inputs:
      tag:
        description: "Version tag to publish"
        type: string
        required: true

  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish"
        type: string
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production-github
    permissions:
      contents: write
    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release edit "${{ inputs.tag }}" --draft=false
