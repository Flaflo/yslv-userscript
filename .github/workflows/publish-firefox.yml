name: Publish Firefox Add-on

on:
  workflow_call:
    inputs:
      tag:
        description: "Version tag to publish"
        type: string
        required: true

  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish"
        type: string
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production-firefox
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          args: --version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Firefox extension from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release download "${{ inputs.tag }}" --pattern "yslv-firefox.zip"

      - name: Download source archive
        run: curl -sL "https://github.com/${{ github.repository }}/archive/refs/tags/${{ inputs.tag }}.zip" -o yslv-source.zip

      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(git-cliff --latest --strip header --config cliff.toml)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ inputs.tag }}"
          fi
          {
            echo "value<<RELEASE_NOTES_EOF"
            echo "$NOTES"
            echo "RELEASE_NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish to Firefox AMO
        uses: browser-actions/release-firefox-addon@latest
        with:
          addon-id: yslv@flaflo.xyz
          addon-path: yslv-firefox.zip
          source-path: yslv-source.zip
          license: MIT
          release-note: ${{ steps.notes.outputs.value }}
          approval-note: "Build: npm ci && npm run build:ext"
          auth-api-issuer: ${{ secrets.AMO_ISSUER }}
          auth-api-secret: ${{ secrets.AMO_SECRET }}
