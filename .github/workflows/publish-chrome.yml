name: Publish Chrome Extension

on:
  workflow_call:
    inputs:
      tag:
        description: "Version tag to publish"
        type: string
        required: true

  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to publish"
        type: string
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production-chrome
    steps:
      - name: Download Chrome extension from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release download "${{ inputs.tag }}" --pattern "yslv-chromium.zip"

      - name: Publish to Chrome Web Store
        uses: browser-actions/release-chrome-extension@latest
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          extension-path: yslv-chromium.zip
          oauth-client-id: ${{ secrets.CHROME_CLIENT_ID }}
          oauth-client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          oauth-refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
